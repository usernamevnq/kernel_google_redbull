name: Build Pixel 5 Kernel (Redbull)
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Kernel Source
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential flex bison lz4 libssl-dev libelf-dev \
          binutils-aarch64-linux-gnu binutils-arm-linux-gnueabi python3 git

      - name: Setup Clang
        uses: radioactive-pigeon/setup-clang-aosp@master
        with:
          clang-version: 'r416183b'

      - name: Manual KernelSU Integration
        run: |
          # If drivers/kernelsu is missing or empty, pull it manually
          if [ ! -f "drivers/kernelsu/Kconfig" ]; then
            echo "KernelSU missing, pulling source..."
            rm -rf drivers/kernelsu
            git clone https://github.com/tiann/KernelSU drivers/kernelsu
          fi

      - name: Build Kernel
        run: |
          # Correcting the paths for Clang and Binutils
          export ARCH=arm64
          export CC=clang
          export CLANG_TRIPLE=aarch64-linux-gnu-
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
          
          # Force the build to use the Clang linker if needed
          export LD=ld.lld
          export AR=llvm-ar
          export NM=llvm-nm
          export OBJCOPY=llvm-objcopy
          export OBJDUMP=llvm-objdump
          export STRIP=llvm-strip

          # Configuration
          make O=out redbull_defconfig
          
          # Compilation
          make -j$(nproc --all) O=out

      - name: Upload Kernel Image
        uses: actions/upload-artifact@v4
        with:
          name: Pixel5-Kernel-Build
          path: |
            out/arch/arm64/boot/Image.lz4
            out/arch/arm64/boot/dtbo.img
