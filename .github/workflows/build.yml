name: Build Pixel 5 Kernel
on:
  workflow_dispatch: # Allows you to start the build manually

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Kernel Source
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Build Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential flex bison lz4 libssl-dev libelf-dev binutils-aarch64-linux-gnu git-lfs

      - name: Download AOSP Clang
        run: |
          mkdir -p clang
          # Using Clang r416183b (Standard for Redbull/Pixel 5)
          curl -LSs "https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/clang-r416183b.tar.gz" | tar -xzC clang
          echo "$(pwd)/clang/bin" >> $GITHUB_PATH

      - name: Build Kernel
        run: |
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
          export CC=clang
          export CLANG_TRIPLE=aarch64-linux-gnu-
          
          # Fix KernelSU Dubious Ownership for the Action Runner
          git config --global --add safe.directory $GITHUB_WORKSPACE/KernelSU || true
          
          # Configuration and Compilation
          make O=out redbull_defconfig
          make -j$(nproc --all) O=out

      - name: Upload Kernel Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Pixel5-Kernel-Build
          path: |
            out/arch/arm64/boot/Image.lz4
            out/arch/arm64/boot/dtbo.img
