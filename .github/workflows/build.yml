name: Build Pixel 5 Kernel (Redbull)
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Kernel Source
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential flex bison lz4 libssl-dev libelf-dev \
          binutils-aarch64-linux-gnu binutils-arm-linux-gnueabi python3 git

      - name: Download Clang Toolchain
        run: |
          git clone https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 --depth 1 --single-branch -b main ./clang-repo
          # We point to the specific version folder inside the repo
          echo "$(pwd)/clang-repo/clang-r416183b/bin" >> $GITHUB_PATH

      - name: Integrate KernelSU and Build
        run: |
          # 1. Force Integrate KernelSU
          rm -rf drivers/kernelsu
          git clone https://github.com/tiann/KernelSU drivers/kernelsu
          
          # 2. Set Environment Variables
          export ARCH=arm64
          export CC=clang
          export CLANG_TRIPLE=aarch64-linux-gnu-
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
          
          # Use LLVM tools provided by Clang
          export LD=ld.lld
          export AR=llvm-ar
          export NM=llvm-nm
          export OBJCOPY=llvm-objcopy
          export OBJDUMP=llvm-objdump
          export STRIP=llvm-strip

          # 3. Clean and Configure
          mkdir -p out
          make O=out clean
          make O=out mrproper
          
          # 4. Generate Config
          make O=out redbull_defconfig
          
          # 5. Compile
          make -j$(nproc --all) O=out

      - name: Upload Kernel Image
        uses: actions/upload-artifact@v4
        with:
          name: Pixel5-Kernel-Build
          path: |
            out/arch/arm64/boot/Image.lz4
            out/arch/arm64/boot/dtbo.img
