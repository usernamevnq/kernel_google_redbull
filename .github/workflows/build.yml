name: Build Pixel 5 Kernel (Redbull)
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Kernel Source
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential flex bison lz4 libssl-dev libelf-dev \
          binutils-aarch64-linux-gnu binutils-arm-linux-gnueabi python3 git

      - name: Download Clang Toolchain
        run: |
          git clone https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 --depth 1 --single-branch -b main ./clang-repo
          # We point to the specific version folder inside the repo
          echo "$(pwd)/clang-repo/clang-r416183b/bin" >> $GITHUB_PATH

      - name: Debug and Integrate KernelSU
        run: |
          # 1. Clean up and Clone
          rm -rf drivers/kernelsu
          git clone https://github.com/tiann/KernelSU drivers/kernelsu
          
          # 2. DEBUG: Show us what is actually in the drivers folder
          echo "Checking drivers directory structure:"
          ls -d drivers/*/ | grep kernelsu || echo "kernelsu folder not found!"
          ls drivers/kernelsu/Kconfig || echo "Kconfig NOT FOUND in drivers/kernelsu/"
          
          # 3. Patch drivers/Kconfig if it's missing the link (Safety measure)
          if ! grep -q "kernelsu" drivers/Kconfig; then
            echo 'source "drivers/kernelsu/Kconfig"' >> drivers/Kconfig
          fi

      - name: Build Kernel
        run: |
          # Set Paths
          export ARCH=arm64
          export CC=clang
          export CLANG_TRIPLE=aarch64-linux-gnu-
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
          
          # Force the use of LLVM tools
          export LD=ld.lld
          export AR=llvm-ar
          export NM=llvm-nm
          export OBJCOPY=llvm-objcopy
          export OBJDUMP=llvm-objdump
          export STRIP=llvm-strip

          # Clean the 'out' directory
          mkdir -p out
          
          # Configuration
          make O=out ARCH=arm64 redbull_defconfig
          
          # Compilation
          make -j$(nproc --all) O=out ARCH=arm64

      - name: Upload Kernel Image
        uses: actions/upload-artifact@v4
        with:
          name: Pixel5-Kernel-Build
          path: |
            out/arch/arm64/boot/Image.lz4
            out/arch/arm64/boot/dtbo.img
